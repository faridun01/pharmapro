<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f5f5f0;
      }

      body {
        overflow: hidden;
        font-family: "Segoe UI", sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #preboot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top left, rgba(90, 90, 64, 0.14), transparent 32%),
          radial-gradient(circle at bottom right, rgba(21, 22, 25, 0.12), transparent 30%),
          linear-gradient(135deg, #f7f6ef 0%, #efede3 100%);
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #preboot-splash.preboot-splash--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @keyframes pharma-splash-orbit {
        0% { transform: translate3d(0, 0, 0) scale(1); }
        50% { transform: translate3d(0, -16px, 0) scale(1.05); }
        100% { transform: translate3d(0, 0, 0) scale(1); }
      }

      @keyframes pharma-splash-pulse {
        0% { transform: scale(0.92); opacity: 0.45; }
        50% { transform: scale(1.08); opacity: 0.9; }
        100% { transform: scale(0.92); opacity: 0.45; }
      }

      @keyframes pharma-splash-loader {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
        40% { transform: translateY(-8px); opacity: 1; }
      }

      @keyframes pharma-splash-sheen {
        0% { transform: translateX(-140%) rotate(16deg); opacity: 0; }
        18% { opacity: 0.55; }
        42% { opacity: 0.28; }
        100% { transform: translateX(190%) rotate(16deg); opacity: 0; }
      }

      @keyframes pharma-splash-chip-float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
        100% { transform: translateY(0); }
      }

      @keyframes preboot-progress {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(0%); }
      }

      .pharma-splash {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(196, 171, 104, 0.28), transparent 30%),
          radial-gradient(circle at bottom right, rgba(90, 90, 64, 0.24), transparent 28%),
          linear-gradient(135deg, #fbf8f0 0%, #efe8d8 42%, #e5ddcb 100%);
      }

      .pharma-splash__backdrop {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .pharma-splash__orb {
        position: absolute;
        border-radius: 9999px;
        filter: blur(10px);
        animation: pharma-splash-orbit 5.4s ease-in-out infinite;
      }

      .pharma-splash__orb--left {
        top: 14%;
        left: 10%;
        width: 230px;
        height: 230px;
        background: rgba(90, 90, 64, 0.14);
      }

      .pharma-splash__orb--right {
        right: 8%;
        bottom: 10%;
        width: 280px;
        height: 280px;
        background: rgba(179, 150, 84, 0.16);
        animation-delay: -2.2s;
      }

      .pharma-splash__grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(90, 90, 64, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(90, 90, 64, 0.06) 1px, transparent 1px);
        background-size: 42px 42px;
        -webkit-mask-image: radial-gradient(circle at center, black, transparent 82%);
        mask-image: radial-gradient(circle at center, black, transparent 82%);
      }

      .pharma-splash__cross {
        position: absolute;
        width: 120px;
        height: 120px;
        opacity: 0.14;
      }

      .pharma-splash__cross::before,
      .pharma-splash__cross::after {
        content: '';
        position: absolute;
        background: linear-gradient(180deg, rgba(140, 122, 63, 0.55), rgba(90, 90, 64, 0.22));
        border-radius: 9999px;
      }

      .pharma-splash__cross::before {
        top: 0;
        left: 42px;
        width: 36px;
        height: 120px;
      }

      .pharma-splash__cross::after {
        top: 42px;
        left: 0;
        width: 120px;
        height: 36px;
      }

      .pharma-splash__cross--top {
        top: 9%;
        right: 11%;
      }

      .pharma-splash__cross--bottom {
        bottom: 10%;
        left: 12%;
        transform: scale(0.8);
      }

      .pharma-splash__card {
        position: relative;
        z-index: 1;
        width: min(520px, calc(100vw - 32px));
        padding: 30px 28px 26px;
        border-radius: 32px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 252, 245, 0.64));
        border: 1px solid rgba(122, 109, 69, 0.14);
        box-shadow: 0 30px 90px rgba(74, 65, 36, 0.16);
        backdrop-filter: blur(22px);
        overflow: hidden;
      }

      .pharma-splash__sheen {
        position: absolute;
        top: -30%;
        left: -20%;
        width: 42%;
        height: 160%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0));
        filter: blur(8px);
        transform: translateX(-140%) rotate(16deg);
        animation: pharma-splash-sheen 4.8s ease-in-out infinite;
        pointer-events: none;
      }

      .pharma-splash__badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 auto 18px;
        padding: 8px 14px;
        border-radius: 9999px;
        background: rgba(255, 250, 241, 0.75);
        border: 1px solid rgba(140, 122, 63, 0.16);
        color: rgba(75, 67, 39, 0.76);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        width: fit-content;
      }

      .pharma-splash__badge-icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.1;
      }

      .pharma-splash__logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        margin: 0 auto 22px;
      }

      .pharma-splash__logo-ring {
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.24) 0%, rgba(90, 90, 64, 0.12) 60%, transparent 72%);
        animation: pharma-splash-pulse 2.4s ease-in-out infinite;
      }

      .pharma-splash__emblem {
        position: absolute;
        inset: 3px;
        border-radius: 9999px;
        border: 1px solid rgba(207, 182, 111, 0.42);
        box-shadow: inset 0 0 0 6px rgba(255, 248, 230, 0.42);
        pointer-events: none;
      }

      .pharma-splash__emblem-mark {
        position: absolute;
        top: -3px;
        right: -3px;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        color: #fff9e8;
        background: linear-gradient(145deg, #cfb76f 0%, #9a8451 100%);
        box-shadow: 0 10px 18px rgba(108, 89, 39, 0.24);
      }

      .pharma-splash__emblem-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.1;
      }

      .pharma-splash__logo-core {
        position: absolute;
        inset: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        color: #fff;
        background: linear-gradient(145deg, #6f6b4b 0%, #5a5a40 48%, #3e412b 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 16px 30px rgba(90, 90, 64, 0.28);
      }

      .pharma-splash__logo-icon {
        width: 34px;
        height: 34px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.1;
      }

      .pharma-splash__content {
        text-align: center;
      }

      .pharma-splash__eyebrow {
        margin-bottom: 10px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.28em;
        color: rgba(90, 90, 64, 0.58);
      }

      .pharma-splash__title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 1.02;
        color: #363726;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .pharma-splash__subtitle {
        margin: 12px auto 0;
        max-width: 340px;
        font-size: 14px;
        line-height: 1.6;
        color: rgba(54, 55, 38, 0.72);
      }

      .pharma-splash__chips {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 22px;
      }

      .pharma-splash__chip {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 11px 12px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(247, 240, 225, 0.55));
        border: 1px solid rgba(140, 122, 63, 0.12);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
        animation: pharma-splash-chip-float 3.4s ease-in-out infinite;
      }

      .pharma-splash__chip:nth-child(2) {
        animation-delay: 0.25s;
      }

      .pharma-splash__chip:nth-child(3) {
        animation-delay: 0.5s;
      }

      .pharma-splash__chip-label {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(90, 90, 64, 0.5);
      }

      .pharma-splash__chip-value {
        font-size: 13px;
        font-weight: 700;
        color: #403d2d;
      }

      .pharma-splash__loader {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 24px;
      }

      .pharma-splash__loader span {
        width: 10px;
        height: 10px;
        border-radius: 9999px;
        background: linear-gradient(180deg, #827d57 0%, #5a5a40 100%);
        animation: pharma-splash-loader 1.1s ease-in-out infinite;
      }

      .pharma-splash__loader span:nth-child(2) {
        animation-delay: 0.16s;
      }

      .pharma-splash__loader span:nth-child(3) {
        animation-delay: 0.32s;
      }

      .pharma-splash__progress {
        position: relative;
        width: 100%;
        height: 8px;
        margin-top: 18px;
        overflow: hidden;
        border-radius: 9999px;
        background: rgba(90, 90, 64, 0.08);
      }

      .pharma-splash__progress-bar {
        position: absolute;
        inset: 0;
        width: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #8a7e52 0%, #d0b97a 52%, #6f6b4b 100%);
        will-change: transform;
        animation: preboot-progress 5s linear forwards;
      }

      .pharma-splash__progress-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
      }

      .pharma-splash__progress-state {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(90, 90, 64, 0.6);
      }

      .pharma-splash__progress-value {
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
        color: #5a5a40;
      }

      @media (max-width: 640px) {
        .pharma-splash__card {
          padding: 24px 20px 22px;
          border-radius: 28px;
        }

        .pharma-splash__chips {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="preboot-splash" aria-hidden="true">
      <div class="pharma-splash">
        <div class="pharma-splash__backdrop">
          <div class="pharma-splash__orb pharma-splash__orb--left"></div>
          <div class="pharma-splash__orb pharma-splash__orb--right"></div>
          <div class="pharma-splash__cross pharma-splash__cross--top"></div>
          <div class="pharma-splash__cross pharma-splash__cross--bottom"></div>
          <div class="pharma-splash__grid"></div>
        </div>

        <div class="pharma-splash__card">
          <div class="pharma-splash__sheen"></div>

          <div class="pharma-splash__badge">
            <svg class="pharma-splash__badge-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4v16M4 12h16" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <span>Решение ITFORCE</span>
          </div>

          <div class="pharma-splash__logo-wrap">
            <div class="pharma-splash__logo-ring"></div>
            <div class="pharma-splash__emblem">
              <div class="pharma-splash__emblem-mark">
                <svg class="pharma-splash__emblem-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 4v16M4 12h16" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </div>
            </div>
            <div class="pharma-splash__logo-core">
              <svg class="pharma-splash__logo-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.5 4.5c-1.933 0-3.5 1.567-3.5 3.5 0 .728.222 1.405.602 1.966L12 16l4.398-6.034A3.49 3.49 0 0 0 17 8c0-1.933-1.567-3.5-3.5-3.5-.999 0-1.9.418-2.5 1.09A3.485 3.485 0 0 0 10.5 4.5Z"></path>
                <path d="m8 16 8-8"></path>
              </svg>
            </div>
          </div>

          <div class="pharma-splash__content">
            <div class="pharma-splash__eyebrow">АПТЕЧНАЯ СИСТЕМА УПРАВЛЕНИЯ</div>
            <h1 class="pharma-splash__title">PharmaPro</h1>
            <p class="pharma-splash__subtitle">Готовим рабочее пространство и открываем вход в систему.</p>
          </div>

          <div class="pharma-splash__chips" aria-hidden="true">
            <div class="pharma-splash__chip">
              <span class="pharma-splash__chip-label">Партнер</span>
              <span class="pharma-splash__chip-value">ITFORCE</span>
            </div>
            <div class="pharma-splash__chip">
              <span class="pharma-splash__chip-label">Статус</span>
              <span class="pharma-splash__chip-value">Безопасный запуск</span>
            </div>
            <div class="pharma-splash__chip">
              <span class="pharma-splash__chip-label">Режим</span>
              <span class="pharma-splash__chip-value">Поддержка ITFORCE</span>
            </div>
          </div>

          <div class="pharma-splash__loader" aria-hidden="true"><span></span><span></span><span></span></div>
          <div class="pharma-splash__progress" aria-hidden="true"><div class="pharma-splash__progress-bar"></div></div>
          <div class="pharma-splash__progress-meta">
            <span class="pharma-splash__progress-state">Запуск</span>
            <span class="pharma-splash__progress-value">0-100%</span>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
