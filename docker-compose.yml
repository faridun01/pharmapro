services:
  db:
    image: postgres:15-alpine
    container_name: pharmapro-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-2468}
      POSTGRES_DB: ${DB_NAME:-pharmapro_test}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
